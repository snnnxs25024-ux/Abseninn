
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://i.imgur.com/79JL73s.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="apple-touch-icon" href="https://i.imgur.com/79JL73s.png">
    <title>ABSENIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* Custom Scrollbar Styling */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9; /* gray-100 */
      }
      ::-webkit-scrollbar-thumb {
        background: #3b82f6; /* blue-500 */
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #2563eb; /* blue-600 */
      }

      /* Print Styling for Thermal Printer - ENHANCED */
      @media print {
        @page {
          /* Common thermal printer widths are 58mm or 80mm */
          size: 58mm auto;
          margin: 0;
        }
        
        body {
          background-color: white;
          margin: 0;
          padding: 0;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }

        /* Hide all elements by default */
        body * {
          visibility: hidden;
        }

        /* Show ONLY the printable container and its children */
        #printable-qr, #printable-qr * {
          visibility: visible;
        }

        /* Position the printable container to fill the page */
        #printable-qr {
          position: absolute;
          left: 50%;
          transform: translateX(-50%);
          top: 0;
          width: 58mm;
          margin: 0;
          padding: 3mm 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: flex-start;
          background-color: white;
        }

        .no-print {
          display: none !important;
        }

        /* Style elements inside the printable area */
        #printable-qr h1 {
          font-size: 14pt !important;
          font-weight: 900 !important;
          margin-bottom: 2mm !important;
          color: black !important;
        }
        #printable-qr img {
          width: 40mm !important;
          height: 40mm !important;
        }
        #printable-qr h2 {
          font-size: 12pt !important;
          font-weight: 900 !important;
          margin-top: 4mm !important;
          margin-bottom: 0 !important;
          color: black !important;
        }
        #printable-qr p {
          font-size: 10pt !important;
          margin-top: 1.5mm !important;
          color: black !important;
          font-weight: 700 !important;
        }
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          },
        },
      }
    </script>
  </head>
  <body class="bg-gray-100 text-gray-800">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
