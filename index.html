
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://i.imgur.com/79JL73s.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="apple-touch-icon" href="https://i.imgur.com/79JL73s.png">
    <title>ABSENIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* Custom Scrollbar Styling */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9; /* gray-100 */
      }
      ::-webkit-scrollbar-thumb {
        background: #3b82f6; /* blue-500 */
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #2563eb; /* blue-600 */
      }

      /* Print Styling for Thermal Printer */
      @media print {
        @page {
          margin: 0;
          size: 58mm auto; /* Default to 58mm thermal width, user can override in settings */
        }
        
        html, body {
          background-color: white;
          margin: 0;
          padding: 0;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }

        /* Hide all elements by default */
        body * {
          visibility: hidden;
        }

        /* Show ONLY the printable container and its children */
        #printable-qr, #printable-qr * {
          visibility: visible;
        }

        /* Position the printable container to fill the page exactly */
        #printable-qr {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          margin: 0;
          padding: 2mm 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: flex-start;
          background-color: white;
          box-sizing: border-box;
        }

        .no-print {
          display: none !important;
        }

        /* Elements inside use viewport width (vw) relative to paper size */
        #printable-qr h1 {
          font-size: 14vw !important;
          font-weight: 900 !important;
          margin: 0 0 2vw 0 !important;
          color: black !important;
          text-align: center;
          line-height: 1.1 !important;
        }
        
        #printable-qr img {
          width: 75% !important; 
          height: auto !important;
          margin: 0 auto;
          display: block !important;
        }
        
        #printable-qr h2 {
          font-size: 8vw !important;
          font-weight: 900 !important;
          margin: 2vw 2vw 0 2vw !important;
          color: black !important;
          text-align: center;
          line-height: 1.2 !important;
          word-wrap: break-word;
          overflow-wrap: break-word;
          max-width: 90% !important;
        }
        
        #printable-qr p {
          font-size: 6vw !important;
          margin: 1vw 0 0 0 !important;
          color: black !important;
          font-weight: 700 !important;
          text-align: center;
          line-height: 1 !important;
        }
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <script>
      if (localStorage.getItem('isDarkMode') === 'true' || (!('isDarkMode' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
        localStorage.setItem('isDarkMode', 'true');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
  </head>
  <body class="bg-[#f8f9fc] text-gray-800 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-200">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
